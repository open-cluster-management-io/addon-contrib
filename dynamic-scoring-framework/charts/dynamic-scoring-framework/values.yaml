hubSetting:
  # Additional pod volumes applied to all hub controller Deployments.
  # Example:
  # extraVolumes:
  #   - name: scoring-config
  #     configMap:
  #       name: scoring-config
  #   - name: scoring-secret
  #     secret:
  #       secretName: scoring-secret
  extraVolumes: []

  # Additional volume mounts applied to all hub controller containers.
  # Example:
  # extraVolumeMounts:
  #   - name: scoring-config
  #     mountPath: /etc/dsf/config
  #     readOnly: true
  #   - name: scoring-secret
  #     mountPath: /etc/dsf/secret
  #     readOnly: true
  extraVolumeMounts: []

  # Namespace where the hub components (e.g. controllers) will be deployed
  namespace: open-cluster-management

  # Whether to skip creating ClusterSetBinding
  # When set to false, ClusterSetBinding for "global" ClusterSet will be created
  skipClusterSetBinding: false

  # The setting for Custom Resource Controller
  resourceController:
    image:
      name: quay.io/open-cluster-management/dynamic-scoring-controller
      tag: latest
      pullPolicy: IfNotPresent

  # The setting for Addon Controller
  addonController:
    image:
      name: quay.io/open-cluster-management/dynamic-scoring-addon
      tag: latest
      pullPolicy: IfNotPresent

spokeSetting:
  # Namespace where the spoke components (e.g. agents) will be deployed
  namespace: dynamic-scoring

  # The setting for Addon Agent
  agent:
    image:
      name: quay.io/open-cluster-management/dynamic-scoring-addon
      tag: latest
      pullPolicy: IfNotPresent
