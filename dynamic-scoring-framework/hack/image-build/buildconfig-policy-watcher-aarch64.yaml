apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: policy-watcher-aarch64-build
  namespace: dynamic-scoring
spec:
  strategy:
    type: Docker
    dockerStrategy:
      pullSecret:
          name: dockerhub-secret
      dockerfilePath: Dockerfile
  source:
    type: Binary
  output:
    to:
      kind: DockerImage
      name: >-
        my-image-registry/dynamic-scoring/policy-watcher:latest-aarch64
    pushSecret:
      name: hub-push-secret