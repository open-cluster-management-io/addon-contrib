apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: {{ .Values.addon.name }}
spec:
  addonName: {{ .Values.addon.name }}
  agentSpec:
    workload:
      manifests:
        # Namespace for flower addon
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: flower-addon
            labels:
              app.kubernetes.io/name: flower-addon
              app.kubernetes.io/managed-by: open-cluster-management

        # SuperNode Deployment
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flower-supernode
            namespace: flower-addon
            labels:
              app.kubernetes.io/name: flower-addon
              app.kubernetes.io/component: supernode
            annotations:
              cluster-name: "{{`{{CLUSTER_NAME}}`}}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: flower-addon
                app.kubernetes.io/component: supernode
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: flower-addon
                  app.kubernetes.io/component: supernode
                annotations:
                  cluster-name: "{{`{{CLUSTER_NAME}}`}}"
              spec:
                containers:
                  - name: supernode
                    image: "{{`{{IMAGE}}`}}"
                    imagePullPolicy: {{ .Values.supernode.image.pullPolicy }}
                    args:
                      {{- if .Values.tls.enabled }}
                      - "--root-certificates=/etc/flower/tls/ca.crt"
                      {{- else }}
                      - "--insecure"
                      {{- end }}
                      - "--superlink={{`{{SUPERLINK_ADDRESS}}`}}:{{`{{SUPERLINK_PORT}}`}}"
                      - "--node-config"
                      - 'cluster-name="{{`{{CLUSTER_NAME}}`}}" num-partitions={{`{{NUM_PARTITIONS}}`}}'
                      - "--isolation=process"
                      - "--clientappio-api-address=0.0.0.0:9094"
                    {{- if .Values.tls.enabled }}
                    volumeMounts:
                      - name: tls-ca
                        mountPath: /etc/flower/tls
                        readOnly: true
                    {{- end }}
                    ports:
                      - name: clientappio
                        containerPort: 9094
                        protocol: TCP
                    resources:
                      {{- toYaml .Values.supernode.resources | nindent 22 }}
                    livenessProbe:
                      tcpSocket:
                        port: 9094
                      initialDelaySeconds: 30
                      periodSeconds: 10
                    readinessProbe:
                      tcpSocket:
                        port: 9094
                      initialDelaySeconds: 5
                      periodSeconds: 5
                {{- if .Values.tls.enabled }}
                volumes:
                  - name: tls-ca
                    secret:
                      secretName: flower-tls-ca
                {{- end }}

        {{- if .Values.tls.enabled }}
        # CA certificate Secret (distributed to managed clusters)
        {{- $caSecret := (lookup "v1" "Secret" .Values.superlink.namespace .Values.tls.ca.secretName) }}
        {{- if not $caSecret }}
        {{- fail (printf "TLS enabled but Secret '%s/%s' not found. Run hack/generate-certs.sh first." .Values.superlink.namespace .Values.tls.ca.secretName) }}
        {{- end }}
        - apiVersion: v1
          kind: Secret
          metadata:
            name: flower-tls-ca
            namespace: flower-addon
          type: Opaque
          data:
            ca.crt: {{ index $caSecret.data "ca.crt" }}
        {{- end }}

        # SuperNode Service
        - apiVersion: v1
          kind: Service
          metadata:
            name: flower-supernode
            namespace: flower-addon
            labels:
              app.kubernetes.io/name: flower-addon
              app.kubernetes.io/component: supernode
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: flower-addon
              app.kubernetes.io/component: supernode
            ports:
              - name: clientappio
                port: 9094
                targetPort: 9094
                protocol: TCP
