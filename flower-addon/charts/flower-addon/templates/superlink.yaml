{{- if .Values.superlink.enabled }}
{{- if .Values.tls.enabled }}
{{- $serverSecret := (lookup "v1" "Secret" .Values.superlink.namespace .Values.tls.serverCert.secretName) }}
{{- if not $serverSecret }}
{{- fail (printf "TLS enabled but Secret '%s/%s' not found. Run hack/generate-certs.sh first." .Values.superlink.namespace .Values.tls.serverCert.secretName) }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superlink
  namespace: {{ .Values.superlink.namespace }}
  labels:
    {{- include "flower-addon.superlinkLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "flower-addon.superlinkSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flower-addon.superlinkSelectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: superlink
        image: {{ .Values.superlink.image.repository }}:{{ .Values.superlink.image.tag }}
        imagePullPolicy: {{ .Values.superlink.image.pullPolicy }}
        args:
        {{- if .Values.tls.enabled }}
        - "--ssl-ca-certfile=/etc/flower/tls/ca.crt"
        - "--ssl-certfile=/etc/flower/tls/server.pem"
        - "--ssl-keyfile=/etc/flower/tls/server.key"
        {{- end }}
        {{- range .Values.superlink.args }}
        {{- if not (and $.Values.tls.enabled (eq . "--insecure")) }}
        - {{ . | quote }}
        {{- end }}
        {{- end }}
        ports:
        - name: exec
          containerPort: 9091
          protocol: TCP
        - name: fleet
          containerPort: 9092
          protocol: TCP
        - name: control
          containerPort: 9093
          protocol: TCP
        {{- if .Values.tls.enabled }}
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/flower/tls
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.superlink.resources | nindent 10 }}
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 5
          periodSeconds: 5
      {{- if .Values.tls.enabled }}
      volumes:
      - name: tls-certs
        secret:
          secretName: {{ .Values.tls.serverCert.secretName }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: superlink
  namespace: {{ .Values.superlink.namespace }}
  labels:
    {{- include "flower-addon.superlinkLabels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "flower-addon.superlinkSelectorLabels" . | nindent 4 }}
  ports:
  - name: exec
    port: 9091
    targetPort: 9091
    nodePort: {{ .Values.superlink.nodePort.exec }}
    protocol: TCP
  - name: fleet
    port: 9092
    targetPort: 9092
    nodePort: {{ .Values.superlink.nodePort.fleet }}
    protocol: TCP
  - name: control
    port: 9093
    targetPort: 9093
    nodePort: {{ .Values.superlink.nodePort.control }}
    protocol: TCP
{{- end }}
