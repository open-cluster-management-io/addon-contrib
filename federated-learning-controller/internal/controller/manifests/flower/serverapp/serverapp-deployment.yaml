apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: federated-learning
    app.kubernetes.io/component: superexec-serverapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: superexec-serverapp
      app.kubernetes.io/instance: {{ .Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: superexec-serverapp
        app.kubernetes.io/instance: {{ .Name }}
    spec:
      containers:
        - name: superexec
          image: {{ .Image }}
          imagePullPolicy: Always
          args:
            - "--insecure"
            - "--appio-api-address={{ .SuperLinkAddress }}"
            - "--plugin-type=serverapp"
