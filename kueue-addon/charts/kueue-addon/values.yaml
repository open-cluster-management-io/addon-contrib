# Default values for kueue-addon.
# This is a YAML-formatted file.

# Image configuration
image:
  repository: quay.io/open-cluster-management/kueue-addon
  tag:
  pullPolicy: IfNotPresent

# Skip cluster set binding
skipClusterSetBinding: false

# Placement configuration
placement:
  name: spoke

# Resource flavor
resourceFlavor:
  name: default-flavor

# Cluster queue
clusterQueue:
  name: cluster-queue
  namespaceSelector: "{}"  # match all namespaces
  resourceGroups:
  - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
    flavors:
    - name: "default-flavor"
      resources:
      - name: "cpu"
        nominalQuota: 9
      - name: "memory"
        nominalQuota: 36Gi
      - name: "nvidia.com/gpu"
        nominalQuota: 3

# Local queue
localQueue:
  name: user-queue
  namespace: default

# This is the namespace where the kueue controller is installed, will copy the multikueue secret to this namespace
# Default is kueue-system
kueue:
  namespace: "kueue-system"

# Install Kueue via Operator
installKueueViaOperator: false

# Kueue Operator configuration
kueueOperator:
  name: kueue-operator
  namespace: openshift-kueue-operator
  operatorGroupName: openshift-kueue-operator
  channel: stable-v1.0
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: kueue-operator.v1.0.0

# Cert Manager Operator configuration
certManagerOperator:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
  operatorGroupName: cert-manager-operator
  channel: stable-v1
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: cert-manager-operator.v1.16.1
