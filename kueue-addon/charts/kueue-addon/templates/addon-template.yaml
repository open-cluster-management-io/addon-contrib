apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: kueue-addon-{{ .Chart.Version }}
spec:
  addonName: kueue-addon
  agentSpec:
    workload:
      manifests:
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kueue-resourceflavor-ocm-rolebinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kueue-resourceflavor-editor-role
          subjects:
          - kind: ServiceAccount
            name: klusterlet-work-sa
            namespace: open-cluster-management-agent
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kueue-clusterqueue-ocm-rolebinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kueue-clusterqueue-editor-role
          subjects:
          - kind: ServiceAccount
            name: klusterlet-work-sa
            namespace: open-cluster-management-agent
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kueue-localqueue-ocm-rolebinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kueue-localqueue-editor-role
          subjects:
          - kind: ServiceAccount
            name: klusterlet-work-sa
            namespace: open-cluster-management-agent
        - apiVersion: kueue.x-k8s.io/v1beta1
          kind: ResourceFlavor
          metadata:
            name: {{ .Values.resourceFlavor.name}}
        - apiVersion: kueue.x-k8s.io/v1beta1
          kind: ClusterQueue
          metadata:
            name: {{ .Values.clusterQueue.name}}
          spec:
            namespaceSelector: {{ .Values.clusterQueue.namespaceSelector  }}
            resourceGroups: 
            {{- toYaml .Values.clusterQueue.resourceGroups | nindent 12 }}
        - apiVersion: kueue.x-k8s.io/v1beta1
          kind: LocalQueue
          metadata:
            namespace: {{ .Values.localQueue.namespace}}
            name: {{ .Values.localQueue.name}}
          spec:
            clusterQueue: {{ .Values.clusterQueue.name}}
        {{ if .Values.installKueueViaOperator }}
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kueue-operator-lifecycle-manager-rolebinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: system:controller:operator-lifecycle-manager
          subjects:
          - kind: ServiceAccount
            name: klusterlet-work-sa
            namespace: open-cluster-management-agent
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ .Values.kueueOperator.namespace }}
        - apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: {{ .Values.kueueOperator.operatorGroupName }}
            namespace: {{ .Values.kueueOperator.namespace }}
          spec:
            upgradeStrategy: Default
        - apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: {{ .Values.kueueOperator.name }}
            namespace: {{ .Values.kueueOperator.namespace }}
          spec:
            channel: {{ .Values.kueueOperator.channel }}
            installPlanApproval: Automatic
            name: {{ .Values.kueueOperator.name }}
            source: {{ .Values.kueueOperator.source }}
            sourceNamespace: {{ .Values.kueueOperator.sourceNamespace }}
            startingCSV: {{ .Values.kueueOperator.startingCSV }}
        - apiVersion: kueue.openshift.io/v1
          kind: Kueue
          metadata:
            name: cluster
            labels:
              app.kubernetes.io/managed-by: kustomize
              app.kubernetes.io/name: kueue-operator
          spec:
            config:
              integrations:
                frameworks:
                - BatchJob
            managementState: Managed
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ .Values.certManagerOperator.namespace }}
        - apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: {{ .Values.certManagerOperator.operatorGroupName }}
            namespace: {{ .Values.certManagerOperator.namespace }}
          spec:
            upgradeStrategy: Default
        - apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: {{ .Values.certManagerOperator.name }}
            namespace: {{ .Values.certManagerOperator.namespace }}
          spec:
            channel: {{ .Values.certManagerOperator.channel }}
            installPlanApproval: Automatic
            name: {{ .Values.certManagerOperator.name }}
            source: {{ .Values.certManagerOperator.source }}
            sourceNamespace: {{ .Values.certManagerOperator.sourceNamespace }}
            startingCSV: {{ .Values.certManagerOperator.startingCSV }}
        {{- end }}

